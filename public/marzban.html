<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marzban Auto Installer</title>
  <link rel="stylesheet" href="/download.css">
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <main class="wrap">
    <header class="header">
      <div class="mark" aria-hidden="true"></div>
      <div>
        <h1>Marzban Auto Installer</h1>
        <p>Runs the official installer via SSH and streams logs. Use only on a fresh Ubuntu/Debian VPS.</p>
      </div>
    </header>

    <section class="card">
      <form id="form" class="form">
        <div class="field">
          <label for="token">Admin Token</label>
          <input id="token" name="token" type="text" autocomplete="off" dir="ltr" placeholder="Paste token from bot /cleanup link" required>
        </div>

        <div class="field">
          <label for="host">IP / Host</label>
          <input id="host" name="host" type="text" autocomplete="off" dir="ltr" placeholder="213.142.132.5" required>
        </div>

        <div class="field">
          <label for="port">SSH Port</label>
          <input id="port" name="port" type="number" inputmode="numeric" autocomplete="off" dir="ltr" placeholder="22" required>
        </div>

        <div class="field">
          <label for="username">SSH Username</label>
          <input id="username" name="username" type="text" autocomplete="off" dir="ltr" placeholder="root" required>
        </div>

        <div class="field">
          <label for="password">SSH Password</label>
          <input id="password" name="password" type="password" autocomplete="off" dir="ltr" placeholder="password" required>
          <div class="hint">The password is not stored. It is only sent to the API for each poll request.</div>
        </div>

        <div class="actions">
          <button type="submit" class="btn primary" id="btnStart">Start Install</button>
          <button type="button" class="btn" id="btnStop" disabled>Stop Polling</button>
          <button type="button" class="btn" id="btnClear">Clear Log</button>
        </div>
      </form>

      <div class="result" style="margin-top:14px">
        <div class="resultRow">
          <div class="resultLabel">Status</div>
          <div id="statusLine" class="hint" style="margin-top:0">Idle</div>
        </div>
        <div class="resultRow">
          <div class="resultLabel">Log</div>
          <pre id="logBox" style="margin:0;max-height:420px;overflow:auto;background:rgba(15, 23, 42, 0.75);border:1px solid rgba(148, 163, 184, 0.22);border-radius:12px;padding:12px;white-space:pre-wrap;word-break:break-word;"></pre>
        </div>
      </div>
    </section>

    <footer class="footer">
      <a href="/" class="footerLink">Home</a>
      <span class="dot" aria-hidden="true">•</span>
      <a href="/cleanup.html" class="footerLink">Cleanup</a>
    </footer>
  </main>

  <script>
    const form = document.getElementById("form");
    const tokenEl = document.getElementById("token");
    const hostEl = document.getElementById("host");
    const portEl = document.getElementById("port");
    const usernameEl = document.getElementById("username");
    const passwordEl = document.getElementById("password");
    const btnStart = document.getElementById("btnStart");
    const btnStop = document.getElementById("btnStop");
    const btnClear = document.getElementById("btnClear");
    const logBox = document.getElementById("logBox");
    const statusLine = document.getElementById("statusLine");

    let polling = false;
    let pollTimer = null;
    let job = null;

    function setStatus(text) {
      statusLine.textContent = text;
    }

    function readQuery() {
      const u = new URL(window.location.href);
      const t = u.searchParams.get("token");
      if (t && !tokenEl.value) tokenEl.value = t;
      const h = u.searchParams.get("host");
      if (h && !hostEl.value) hostEl.value = h;
      const p = u.searchParams.get("port");
      if (p && !portEl.value) portEl.value = p;
      const un = u.searchParams.get("username");
      if (un && !usernameEl.value) usernameEl.value = un;
    }

    function payloadBase() {
      return {
        token: String(tokenEl.value || "").trim(),
        host: String(hostEl.value || "").trim(),
        port: Number(portEl.value || 22),
        username: String(usernameEl.value || "").trim(),
        password: String(passwordEl.value || "")
      };
    }

    async function api(action, extra) {
      const body = Object.assign(payloadBase(), { action }, extra || {});
      const res = await fetch("/api/marzban-install", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => null);
      if (!res.ok || !data || !data.ok) {
        const msg = data && data.error ? data.error : ("HTTP " + res.status);
        throw new Error(msg);
      }
      return data;
    }

    async function start() {
      setStatus("Starting...");
      const data = await api("start");
      job = { pid: data.pid, logPath: data.logPath, jobId: data.jobId };
      localStorage.setItem("marzban_job", JSON.stringify({ job, host: hostEl.value, port: portEl.value, username: usernameEl.value }));
      setStatus(`Started. PID=${job.pid} Log=${job.logPath}`);
      beginPolling();
    }

    async function pollOnce() {
      if (!job) return;
      const data = await api("tail", { pid: job.pid, logPath: job.logPath });
      if (typeof data.output === "string") {
        logBox.textContent = data.output;
        logBox.scrollTop = logBox.scrollHeight;
      }
      if (data.done) {
        polling = false;
        btnStop.disabled = true;
        btnStart.disabled = false;
        const ec = data.exitCode === null || data.exitCode === undefined ? "?" : String(data.exitCode);
        setStatus(`Done. exitCode=${ec}`);
        return;
      }
      setStatus(data.running ? "Running..." : "Not running (maybe finished).");
    }

    function beginPolling() {
      if (polling) return;
      polling = true;
      btnStop.disabled = false;
      btnStart.disabled = true;
      const loop = async () => {
        if (!polling) return;
        try {
          await pollOnce();
        } catch (e) {
          setStatus("Error: " + (e && e.message ? e.message : String(e)));
        }
        if (!polling) return;
        pollTimer = setTimeout(loop, 2000);
      };
      loop();
    }

    btnStop.addEventListener("click", () => {
      polling = false;
      btnStop.disabled = true;
      btnStart.disabled = false;
      if (pollTimer) clearTimeout(pollTimer);
      setStatus("Polling stopped.");
    });

    btnClear.addEventListener("click", () => {
      logBox.textContent = "";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await start();
      } catch (err) {
        setStatus("Error: " + (err && err.message ? err.message : String(err)));
      }
    });

    readQuery();
    hostEl.value = hostEl.value || "213.142.132.5";
    portEl.value = portEl.value || "22";
    usernameEl.value = usernameEl.value || "root";

    const saved = localStorage.getItem("marzban_job");
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.job) {
          job = parsed.job;
          setStatus(`Loaded previous job. PID=${job.pid} Log=${job.logPath}`);
        }
      } catch {
        // ignore
      }
    }
  </script>
</body>
</html>
