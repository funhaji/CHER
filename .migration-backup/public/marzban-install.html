<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marzban Installer (SSH)</title>
<link rel="stylesheet" href="/download.css">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
<script defer src="/marzban-install.js"></script>
</head>
<body>
<main class="wrap">
<header class="header">
<div class="mark" aria-hidden="true"></div>
<div>
<h1>Marzban Installer (SSH)</h1>
<p>Generate a no-proxy Python installer script you can run locally.</p>
</div>
</header>
 
<section class="card">
<form id="genForm" class="form">
<div class="field">
<label for="host">Host</label>
<input id="host" name="host" type="text" autocomplete="off" dir="ltr" placeholder="213.142.132.5" required>
</div>
 
<div class="field">
<label for="port">Port</label>
<input id="port" name="port" type="number" inputmode="numeric" autocomplete="off" dir="ltr" placeholder="22" required>
</div>
 
<div class="actions">
<button type="button" class="btn primary" id="btnGenerate">Generate Script</button>
<button type="button" class="btn" id="btnCopy">Copy</button>
<button type="button" class="btn" id="btnDownload">Download .py</button>
</div>
</form>
 
<div class="result" id="resultBox">
<div class="resultRow">
<div class="resultLabel">Python Script</div>
<textarea id="scriptBox" dir="ltr" spellcheck="false" style="width:100%;min-height:320px;box-sizing:border-box;border-radius:12px;border:1px solid rgba(148, 163, 184, 0.22);background:rgba(15, 23, 42, 0.75);padding:12px;color:#e5e7eb;outline:none;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;line-height:1.6;white-space:pre;"></textarea>
</div>
</div>
</section>
 
<footer class="footer">
<a href="/" class="footerLink">Home</a>
<span class="dot" aria-hidden="true">•</span>
<a href="/cleanup.html" class="footerLink">Cleanup</a>
</footer>
</main>
</body>
</html>
