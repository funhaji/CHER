<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دانلودر فایل</title>
  <link rel="stylesheet" href="/download.css">
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
  <script defer src="/download.js"></script>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <div class="mark" aria-hidden="true"></div>
      <div>
        <h1>دانلودر فایل</h1>
        <p>لینک فایل را وارد کنید تا از طریق دامنه شما دانلود شود.</p>
      </div>
    </header>

    <section class="card">
      <form id="downloadForm" action="/api/download" method="GET" class="form">
        <div class="field">
          <label for="url">لینک فایل</label>
          <input id="url" name="url" type="url" inputmode="url" autocomplete="off" required dir="ltr" placeholder="https://github.com/...">
          <div class="hint" id="urlHint"></div>
        </div>

        <div class="field">
          <label for="filename">نام فایل (اختیاری)</label>
          <input id="filename" name="filename" type="text" autocomplete="off" dir="ltr" placeholder="example.zip">
        </div>

        <div class="actions">
          <button type="submit" class="btn primary" id="btnDownload">دانلود ابری</button>
          <button type="button" class="btn" id="btnGenerate">ساخت لینک</button>
        </div>
      </form>

      <div id="progressBox" class="progressBox" hidden>
        <div class="progressInfo">
          <span id="progressText">در حال آماده‌سازی...</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progressBarBg">
          <div id="progressBarFill" class="progressBarFill"></div>
        </div>
      </div>

      <div class="result" id="resultBox" hidden>
        <div class="resultRow">
          <div class="resultLabel">لینک دانلود</div>
          <a id="resultLink" class="resultLink" href="#" dir="ltr" rel="noopener">-</a>
        </div>
        <div class="resultActions">
          <button type="button" class="btn" id="btnCopy">کپی</button>
          <a class="btn" id="btnOpen" href="#" target="_blank" rel="noopener">باز کردن</a>
        </div>
      </div>
    </section>

    <footer class="footer">
      <a href="/" class="footerLink">صفحه اصلی</a>
      <span class="dot" aria-hidden="true">•</span>
      <a href="/api/download" class="footerLink" rel="nofollow">API</a>
    </footer>
  </main>
</body>
</html>
